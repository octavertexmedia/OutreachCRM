<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workspaces · OutReachCRM</title>
  {{template "fonts" .}}
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="app-body">
  {{template "nav" .}}

  <div class="page-hero">
    <div>
      <h1>Workspaces</h1>
      <p class="sub" style="margin-bottom:0">Isolate data by team or client.</p>
    </div>
  </div>

  <div class="panel">
    <form class="inline" method="post" action="/workspaces">
      <label>Name<input name="name" required placeholder="Octavertex · Manufacturing"></label>
      <button type="submit">Create</button>
    </form>
  </div>

  <div class="panel camp-list">
    <div class="camp-list-head">
      <h2>All workspaces</h2>
    </div>
    <div style="overflow-x:auto">
      <table class="leads-table">
        <thead><tr><th>Name</th><th>ID</th><th>Created</th></tr></thead>
        <tbody>
        {{range .Workspaces}}
        <tr>
          <td><strong>{{.Name}}</strong></td>
          <td class="muted">{{.ID}}</td>
          <td class="muted">{{.CreatedAt.Format "2006-01-02"}}</td>
        </tr>
        {{else}}
        <tr><td colspan="3" class="muted" style="padding:1.25rem">No workspaces yet.</td></tr>
        {{end}}
        </tbody>
      </table>
    </div>
  </div>

  {{template "foot" .}}
</body>
</html>
