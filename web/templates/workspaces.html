<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workspaces · OutReachCRM</title>{{template "fonts" .}}
  <link rel="stylesheet" href="/static/app.css"></head>
<body class="app-body">
  {{template "nav" .}}
<h1>Workspaces</h1>
<div class="panel"><form class="inline" method="post" action="/workspaces">
<label>Name<input name="name" required></label><button type="submit">Create</button>
</form></div>
<div class="panel"><table><thead><tr><th>ID</th><th>Name</th><th>Created</th></tr></thead>
<tbody>{{range .Workspaces}}<tr><td>{{.ID}}</td><td>{{.Name}}</td><td>{{.CreatedAt.Format "2006-01-02"}}</td></tr>{{end}}</tbody></table></div>
{{template "foot" .}}
</body>
</html>
