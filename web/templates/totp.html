<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2FA · OutReachCRM</title>
  {{template "fonts" .}}
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <h1>Two-factor code</h1>
      <p class="sub">Enter the 6-digit code from your authenticator app.</p>
      <form method="post" action="/login/totp">
        <label>Code<input name="code" inputmode="numeric" pattern="[0-9]{6}" required autofocus autocomplete="one-time-code"></label>
        <div style="margin-top:1rem"><button type="submit" class="btn-block">Verify</button></div>
      </form>
      {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    </div>
  </div>
</body>
</html>
